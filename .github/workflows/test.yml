# Smoke tests on every push/PR. Only numpy is installed — test_smoke.py
# stubs the CLIP encoder, so the torch/transformers stack never loads.
name: test
on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pillow   # pillow: spider.py's icon-size gate runs in test_smoke
      - run: python test_smoke.py
      - run: node docs/js/test_rank.mjs     # the JS math must mirror the Python
      - run: node docs/js/test_lessons.mjs  # the live lessons must reproduce the Python-pinned numbers
      - run: node docs/js/test_crawler.mjs  # web-search fan-out: retries, error prose, dedup — all mocked
      - run: node docs/js/test_learn.mjs    # on-device learned re-ranker: pinned to learn2rank.py
      - run: node docs/js/test_conformal.mjs # conformal sets: JS twin agrees with conformal.py
      - run: node docs/js/test_hermes.mjs   # the agentic searcher's margin gate + qvec, pinned to hermes.py
      - run: node docs/js/test_judge.mjs    # council of LLM judges: gate + quorum + hung-jury, pinned to judge.py
      - run: node docs/js/test_trust.mjs    # the trust composer: agreement + split-decision abstain, pinned to trust.py
      - run: node docs/js/test_drift.mjs    # drift detectors: PSI/KS/coverage stream verdicts, pinned to drift.py
      - run: node docs/js/test_debate.mjs   # multi-agent debate: bounded-confidence consensus/factions, pinned to debate.py
      - run: node docs/js/test_reason.mjs   # the reasoning layer: end-to-end trace + consequence map, pinned to reason.py
      - run: node docs/js/test_orchestrate.mjs # the escalation orchestrator: glance▸panel▸debate routing, pinned to orchestrate.py
      - run: node docs/js/test_flow.mjs     # the structured orchestration runtime: typed DAG + contract gate, pinned to flow.py
      # the model-free CLI demos must keep running on the committed gallery
      - run: python temperature.py
      - run: python similarity.py --json docs/db.json
      - run: python retrieval_eval.py --json docs/db.json
      - run: python arithmetic.py --centroid animal --json docs/db.json
      - run: python quantize.py --json docs/db.json
      - run: python similarity.py --json docs/db.json --centered
      - run: python ann.py
      - run: python hnsw.py               # the navigable-small-world graph index: recall beats IVF at matched work
      - run: python diskann.py            # Vamana graph + PQ-in-RAM: a billion on one box, reads only ~L vectors from disk
      - run: python learn2rank.py           # on-device learning-to-rank, model-free demo
      - run: python conformal.py --json docs/db.json  # conformal coverage table on the gallery
      - run: python judge.py --json docs/db.json --image images/004_cat.jpg  # council of judges, model-free
      - run: python trust.py --json docs/db.json --image images/004_cat.jpg  # compose the honesty lenses into one verdict
      - run: python drift.py --json docs/db.json --selftest  # drift detectors fire in order on a simulated stream
      - run: python debate.py --json docs/db.json --eval      # multi-agent debate as evaluation, model-free
      - run: python orchestrate.py --json docs/db.json --eval  # adaptive escalation: compute follows difficulty, honest abstain
      - run: python flow.py --json docs/db.json --demo-contract # structured orchestration: a rogue sub-agent is quarantined, graph fails closed
      - run: python scaling.py             # the two-billion back-of-envelope, pure arithmetic
      - run: python cascade.py             # the approximation cascade: recall retained at every level
      - run: python reason.py --json docs/db.json --image images/004_cat.jpg  # end-to-end reasoning trace → consequence
      - run: python grow.py --selftest     # bulk gallery-growth: dedup + db.json export, model-free
      - run: python scale.py selftest       # the million-row machinery, synthetic + model-free
      - run: python pq.py selftest          # product quantization: the browser index's math
      - run: node docs/js/test_pq.mjs       # …and its JS twin agrees, lookup for lookup
      - run: python hermes.py --image pizza --json docs/db.json
